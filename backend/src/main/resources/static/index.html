<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYQ Practice Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="bi bi-mortarboard-fill text-primary" style="font-size:3rem;"></i>
                <h2>PYQ Practice Portal</h2>
                <p class="text-muted">Previous Year Questions — Practice & Excel</p>
            </div>

            <div class="d-grid gap-3 mt-4">
                <a href="/student/login.html" class="btn btn-gradient btn-lg">
                    <i class="bi bi-person-fill me-2"></i>Student Login
                </a>
                <a href="/student/register.html" class="btn btn-outline-primary btn-lg">
                    <i class="bi bi-person-plus me-2"></i>Student Register
                </a>
                <hr>
                <a href="/admin/login.html" class="btn btn-outline-secondary">
                    <i class="bi bi-shield-lock me-2"></i>Admin Login
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        // Redirect if already logged in
        if (Auth.isLoggedIn()) {
            if (Auth.getRole() === 'ADMIN') window.location.href = 'admin/dashboard.html';
            else window.location.href = 'student/dashboard.html';
        }
    </script>
</body>
</html>
