spring.datasource.url=jdbc:mysql://localhost:3306/pyq_portal?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=0001
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Run schema.sql on startup (INSERT IGNORE is safe to re-run)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.defer-datasource-initialization=true

jwt.secret=pyqPortalSecretKey2024SuperSecureKeyForJWTTokenGeneration
jwt.expiration=86400000

server.port=8080
