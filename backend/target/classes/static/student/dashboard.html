<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - PYQ Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="bi bi-mortarboard-fill me-2"></i>PYQ Portal</a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <span class="text-white" id="welcomeMsg"></span>
                <a href="history.html" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-clock-history me-1"></i>History
                </a>
                <button class="btn btn-light btn-sm" onclick="Auth.logout()">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Stats Row -->
        <div class="row g-3 mb-4" id="statsRow">
            <div class="col-md-4">
                <div class="stat-card stat-blue">
                    <h3 id="totalAttempts">-</h3>
                    <p><i class="bi bi-journal-check me-1"></i>Tests Attempted</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card stat-green">
                    <h3 id="avgScore">-</h3>
                    <p><i class="bi bi-graph-up me-1"></i>Average Score</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card stat-orange">
                    <h3 id="subjectCount">-</h3>
                    <p><i class="bi bi-book me-1"></i>Subjects Available</p>
                </div>
            </div>
        </div>

        <!-- Subjects -->
        <div class="card">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0"><i class="bi bi-grid-3x3-gap-fill text-primary me-2"></i>Choose a Subject to Practice</h5>
            </div>
            <div class="card-body">
                <div id="subjectList" class="row g-3">
                    <div class="col-12 text-center py-4">
                        <div class="spinner-border text-primary"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script>
        requireAuth('STUDENT');

        const user = Auth.getUser();
        document.getElementById('welcomeMsg').textContent = 'Hi, ' + user.name;

        const subjectColors = ['stat-blue', 'stat-green', 'stat-orange', 'stat-red'];
        const subjectIcons = ['bi-code-slash', 'bi-diagram-3', 'bi-calculator', 'bi-lightbulb', 'bi-database', 'bi-cpu'];

        async function loadDashboard() {
            try {
                const [subjects, history] = await Promise.all([
                    apiGet('/student/subjects'),
                    apiGet('/student/history')
                ]);

                document.getElementById('subjectCount').textContent = subjects.length;
                document.getElementById('totalAttempts').textContent = history.length;

                const avg = history.length
                    ? (history.reduce((s, h) => s + h.score, 0) / history.length).toFixed(1) + '%'
                    : '0%';
                document.getElementById('avgScore').textContent = avg;

                const list = document.getElementById('subjectList');
                if (subjects.length === 0) {
                    list.innerHTML = '<div class="col-12 text-center text-muted py-4">No subjects available yet.</div>';
                    return;
                }

                list.innerHTML = subjects.map((s, i) => `
                    <div class="col-md-4 col-sm-6">
                        <div class="card subject-card h-100" onclick="startTest(${s.id}, '${s.subjectName}')">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="rounded-circle d-flex align-items-center justify-content-center"
                                     style="width:50px;height:50px;background:#eef2ff;">
                                    <i class="bi ${subjectIcons[i % subjectIcons.length]} text-primary fs-4"></i>
                                </div>
                                <div>
                                    <h6 class="mb-0 fw-bold">${s.subjectName}</h6>
                                    <small class="text-muted">Click to start test</small>
                                </div>
                                <i class="bi bi-arrow-right-circle ms-auto text-primary fs-5"></i>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                showToast('Failed to load dashboard: ' + err.message, 'error');
            }
        }

        function startTest(subjectId, subjectName) {
            sessionStorage.setItem('testSubjectId', subjectId);
            sessionStorage.setItem('testSubjectName', subjectName);
            window.location.href = 'test.html';
        }

        loadDashboard();
    </script>
</body>
</html>
