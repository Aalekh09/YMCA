<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Register - PYQ Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="bi bi-person-plus-fill text-primary" style="font-size:2.5rem;"></i>
                <h2>Create Account</h2>
                <p class="text-muted">Join PYQ Practice Portal</p>
            </div>

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" id="name" class="form-control" placeholder="Your full name" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" required>
                    </div>
                </div>

                <div id="alertBox" class="alert d-none"></div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-gradient btn-lg" id="submitBtn">
                        <i class="bi bi-person-check me-2"></i>Register
                    </button>
                </div>
            </form>

            <p class="text-center mt-3 text-muted">
                Already have an account? <a href="login.html" class="text-primary fw-semibold">Login here</a>
            </p>
            <p class="text-center">
                <a href="/index.html" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const alertBox = document.getElementById('alertBox');
            const btn = document.getElementById('submitBtn');

            if (password !== confirm) {
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = 'Passwords do not match';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Registering...';

            try {
                await apiPost('/auth/register', { name, email, password }, false);
                alertBox.className = 'alert alert-success';
                alertBox.textContent = 'Registration successful! Redirecting to login...';
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (err) {
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = err.message;
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-person-check me-2"></i>Register';
            }
        });
    </script>
</body>
</html>
